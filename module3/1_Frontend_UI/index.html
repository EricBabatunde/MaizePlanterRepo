<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autonomous Maize Planter GCS</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
</head>

<body>
  <div class="container">
    <header>
      <h1>Autonomous Maize Planter</h1>
      <p>Ground Control Station</p>
    </header>

    <main>
      <div class="controls">
        <h2>Configuration</h2>
        <div class="input-group">
          <label for="fieldLength">Field Length (m):</label>
          <input type="number" id="fieldLength" value="20" min="5" max="100">
        </div>
        <div class="input-group">
          <label for="fieldWidth">Field Width (m):</label>
          <input type="number" id="fieldWidth" value="5" min="2" max="50">
        </div>
        <div class="input-group">
          <label for="rowSpacing">Row Spacing (m):</label>
          <input type="number" id="rowSpacing" value="0.6" step="0.1" disabled>
        </div>
        <div class="input-group">
          <label for="initialHeading">Initial Heading (deg):</label>
          <input type="number" id="initialHeading" value="45" min="0" max="360">
        </div>
        <button id="startBtn">Generate & Start Mission</button>
        <button id="resetBtn">Reset</button>

        <div class="status-panel">
          <h3>Telemetry Status</h3>
          <p>State: <span id="sysState" class="badge idle">IDLE</span></p>
          <p>Waypoints: <span id="wpCount">0</span></p>
          <p>Seeds Dropped: <span id="seedCount">0</span></p>
          <p>Speed: <span id="telemetrySpeed">0.0</span> m/s</p>
          <p>Heading: <span id="telemetryHeading">0.0</span>°</p>
        </div>
      </div>

      <div class="visualization">
        <div class="grid-container" id="gridContainer">
          <div id="planter" class="planter-icon">▼</div>
          <canvas id="pathCanvas"></canvas>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>

</html>
